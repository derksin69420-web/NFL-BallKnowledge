<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Ball Knowledge Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c18;--card:#0d1424;--border:rgba(255,255,255,0.07);
  --text:#e2e8f0;--dim:#64748b;--mid:#94a3b8;
  --blue:#38bdf8;--purple:#c084fc;--green:#4ade80;
  --red:#f87171;--yellow:#fbbf24;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
.app{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:28px 16px 72px;
  background:
    radial-gradient(ellipse at 10% 0%,rgba(56,189,248,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 100%,rgba(192,132,252,.08) 0%,transparent 50%);
}

/* HEADER */
.header{text-align:center;margin-bottom:36px}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,10vw,82px);letter-spacing:5px;line-height:1;
  background:linear-gradient(135deg,var(--blue) 20%,var(--purple) 80%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--dim);margin-top:4px}

/* CARD */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:32px;width:100%;max-width:580px;
  box-shadow:0 0 0 1px rgba(56,189,248,.03),0 40px 80px rgba(0,0,0,.6);
}

/* LOADING */
.loading{text-align:center;padding:48px 0}
.spinner{
  width:48px;height:48px;border-radius:50%;margin:0 auto 20px;
  border:3px solid rgba(56,189,248,.15);border-top-color:var(--blue);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--blue);margin-bottom:8px}
.loading-sub{font-size:13px;color:var(--dim)}

/* MENU */
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#2a3550;margin-bottom:16px}
.menu-btn{
  display:flex;align-items:center;gap:14px;width:100%;padding:18px 22px;
  border-radius:14px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);color:var(--text);cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:600;text-align:left;
  transition:all .2s;margin-bottom:10px;
}
.menu-btn:hover{background:rgba(56,189,248,.09);border-color:rgba(56,189,248,.4);color:var(--blue);transform:translateX(5px)}
.btn-icon{font-size:22px;flex-shrink:0}
.btn-label{flex:1}
.btn-meta{font-size:12px;color:var(--dim);font-weight:500}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.footnote{font-size:11px;color:#1e2d45;text-align:center;letter-spacing:.5px}
.updated-tag{font-size:11px;color:#2a3a55;text-align:center;margin-top:6px}

/* PROGRESS */
.progress-wrap{width:100%;height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:30px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .4s ease}

/* QUIZ */
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.q-counter{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.streak{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);
  border-radius:20px;padding:3px 11px;font-size:12px;color:var(--yellow);font-weight:700;
}
.cat-badge{
  display:inline-flex;align-items:center;gap:6px;padding:5px 13px;
  border-radius:20px;font-size:11px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;border:1px solid currentColor;margin-bottom:18px;
}
.question{font-size:clamp(17px,3.2vw,22px);font-weight:500;line-height:1.55;margin-bottom:28px;color:#f1f5f9}
.player-name{color:var(--blue);font-weight:700}

/* CHOICES */
.choices{display:flex;flex-direction:column;gap:10px}
.choice{
  display:flex;align-items:center;gap:13px;padding:15px 20px;
  border-radius:13px;border:1px solid var(--border);
  background:rgba(255,255,255,.02);color:#cbd5e1;cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:500;text-align:left;
  transition:all .18s;width:100%;
}
.choice:hover:not(:disabled){background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.35);color:var(--text)}
.choice.correct{background:rgba(74,222,128,.13);border-color:var(--green);color:var(--green)}
.choice.wrong{background:rgba(248,113,113,.13);border-color:var(--red);color:var(--red)}
.choice:disabled{cursor:default}
.letter{
  width:28px;height:28px;border-radius:50%;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;
}

/* FEEDBACK */
.feedback{margin-top:18px;padding:13px 17px;border-radius:12px;font-size:15px;font-weight:500}
.feedback.correct{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.feedback.wrong{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.next-btn{
  margin-top:16px;width:100%;padding:16px;border-radius:13px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--purple));color:#080c18;
  font-family:inherit;font-size:16px;font-weight:700;transition:opacity .2s,transform .1s;
}
.next-btn:hover{opacity:.88;transform:translateY(-2px)}

/* RESULTS */
.score-huge{
  font-family:'Bebas Neue',sans-serif;font-size:96px;line-height:1;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.score-sub{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.grade-row{display:flex;align-items:center;gap:10px;margin:14px 0 4px;justify-content:center}
.grade-emoji{font-size:34px}
.grade-text{font-size:20px;font-weight:700}
.cat-list{display:flex;flex-direction:column;gap:9px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-name{font-size:13px;width:130px;color:var(--mid);white-space:nowrap}
.bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .7s ease}
.cat-frac{font-size:12px;color:var(--dim);width:32px;text-align:right}
.play-again{
  width:100%;padding:18px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--purple));color:#080c18;
  font-family:inherit;font-size:17px;font-weight:700;margin-top:24px;
  transition:opacity .2s,transform .1s;
}
.play-again:hover{opacity:.88;transform:translateY(-2px)}

.screen{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ── CONSTANTS ────────────────────────────────────────────────────────────────
const NFL_TEAMS={ARI:"Arizona Cardinals",ATL:"Atlanta Falcons",BAL:"Baltimore Ravens",BUF:"Buffalo Bills",CAR:"Carolina Panthers",CHI:"Chicago Bears",CIN:"Cincinnati Bengals",CLE:"Cleveland Browns",DAL:"Dallas Cowboys",DEN:"Denver Broncos",DET:"Detroit Lions",GB:"Green Bay Packers",HOU:"Houston Texans",IND:"Indianapolis Colts",JAX:"Jacksonville Jaguars",KC:"Kansas City Chiefs",LV:"Las Vegas Raiders",LAC:"Los Angeles Chargers",LAR:"Los Angeles Rams",MIA:"Miami Dolphins",MIN:"Minnesota Vikings",NE:"New England Patriots",NO:"New Orleans Saints",NYG:"New York Giants",NYJ:"New York Jets",PHI:"Philadelphia Eagles",PIT:"Pittsburgh Steelers",SF:"San Francisco 49ers",SEA:"Seattle Seahawks",TB:"Tampa Bay Buccaneers",TEN:"Tennessee Titans",WAS:"Washington Commanders"};
const DIVISIONS={"AFC East":["Buffalo Bills","Miami Dolphins","New England Patriots","New York Jets"],"AFC North":["Baltimore Ravens","Cincinnati Bengals","Cleveland Browns","Pittsburgh Steelers"],"AFC South":["Houston Texans","Indianapolis Colts","Jacksonville Jaguars","Tennessee Titans"],"AFC West":["Denver Broncos","Kansas City Chiefs","Las Vegas Raiders","Los Angeles Chargers"],"NFC East":["Dallas Cowboys","New York Giants","Philadelphia Eagles","Washington Commanders"],"NFC North":["Chicago Bears","Detroit Lions","Green Bay Packers","Minnesota Vikings"],"NFC South":["Atlanta Falcons","Carolina Panthers","New Orleans Saints","Tampa Bay Buccaneers"],"NFC West":["Arizona Cardinals","Los Angeles Rams","San Francisco 49ers","Seattle Seahawks"]};
const POSITIONS={QB:"Quarterback",RB:"Running Back",WR:"Wide Receiver",TE:"Tight End",K:"Kicker",P:"Punter",OT:"Offensive Tackle",OG:"Offensive Guard",C:"Center",DE:"Defensive End",DT:"Defensive Tackle",LB:"Linebacker",CB:"Cornerback",S:"Safety",FS:"Free Safety",SS:"Strong Safety",LS:"Long Snapper"};
const CAT_META={"Team":{color:"#38bdf8",icon:"🏟"},"Position":{color:"#c084fc",icon:"🎽"},"College":{color:"#fbbf24",icon:"🎓"},"Jersey #":{color:"#34d399",icon:"🔢"},"Roster Spot":{color:"#f472b6",icon:"📋"},"Division":{color:"#60a5fa",icon:"🗺"},"Conference":{color:"#f87171",icon:"🏈"},"Age":{color:"#a78bfa",icon:"🎂"},"Experience":{color:"#fb923c",icon:"📅"},"College Mates":{color:"#4ade80",icon:"🤝"}};

// ── STATE ─────────────────────────────────────────────────────────────────────
let POOL=[], UPDATED="";
let state={screen:"loading",questions:[],idx:0,selected:null,streak:0,results:[]};
const app=document.getElementById("app");

// ── HELPERS ───────────────────────────────────────────────────────────────────
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
const sample=(a,n)=>shuffle(a).slice(0,n);
const pick=a=>a[Math.floor(Math.random()*a.length)];
function randNums(ex,min,max,n){const s=new Set();let t=0;while(s.size<n&&t++<300){const v=Math.floor(Math.random()*(max-min+1))+min;if(v!==ex)s.add(v);}return[...s];}

// ── QUESTION GENERATORS ───────────────────────────────────────────────────────
function qTeam(p){const w=sample(Object.values(NFL_TEAMS).filter(t=>t!==p.team),3);return{q:`What team does ${p.name} play for?`,choices:shuffle([p.team,...w]),answer:p.team,cat:"Team",player:p.name};}
function qPosition(p){if(!POSITIONS[p.pos])return null;const c=POSITIONS[p.pos],w=sample(Object.values(POSITIONS).filter(v=>v!==c),3);return{q:`What position does ${p.name} play?`,choices:shuffle([c,...w]).slice(0,4),answer:c,cat:"Position",player:p.name};}
function qCollege(p){if(!p.college)return null;const o=[...new Set(POOL.map(x=>x.college).filter(c=>c&&c!==p.college))];if(o.length<3)return null;return{q:`Which college did ${p.name} attend?`,choices:shuffle([p.college,...sample(o,3)]),answer:p.college,cat:"College",player:p.name};}
function qJersey(p){const n=parseInt(p.jersey);if(isNaN(n))return null;const w=randNums(n,Math.max(1,n-10),Math.min(99,n+10),3).map(String);return{q:`What jersey number does ${p.name} wear?`,choices:shuffle([p.jersey,...w]),answer:p.jersey,cat:"Jersey #",player:p.name};}
function qRosterSpot(p){if(!POSITIONS[p.pos])return null;const s=POOL.filter(x=>x.pos===p.pos&&x.team!==p.team&&x.name!==p.name).map(x=>x.name);if(s.length<3)return null;return{q:`Which player is the ${POSITIONS[p.pos]} for the ${p.team}?`,choices:shuffle([p.name,...sample(s,3)]),answer:p.name,cat:"Roster Spot",player:p.name};}
function qDivision(p){const d=Object.entries(DIVISIONS).find(([,ts])=>ts.includes(p.team))?.[0];if(!d)return null;const w=sample(Object.keys(DIVISIONS).filter(x=>x!==d),3);return{q:`Which division does the ${p.team} play in?`,choices:shuffle([d,...w]),answer:d,cat:"Division",player:p.name};}
function qConference(p){const d=Object.entries(DIVISIONS).find(([,ts])=>ts.includes(p.team))?.[0];if(!d)return null;const c=d.startsWith("AFC")?"AFC":"NFC",o=c==="AFC"?"NFC":"AFC";return{q:`Is the ${p.team} in the AFC or NFC?`,choices:shuffle([c,o,c+" East",o+" West"]),answer:c,cat:"Conference",player:p.name};}
function qAge(p){if(!p.age)return null;const w=randNums(p.age,Math.max(20,p.age-5),p.age+5,3).map(String);return{q:`How old is ${p.name}?`,choices:shuffle([String(p.age),...w]),answer:String(p.age),cat:"Age",player:p.name};}
function qExperience(p){const l=n=>`${n} year${n!==1?"s":""}`,c=l(p.exp),w=randNums(p.exp,Math.max(0,p.exp-5),p.exp+5,3).map(l);return{q:`How many years of NFL experience does ${p.name} have?`,choices:shuffle([c,...w]),answer:c,cat:"Experience",player:p.name};}
function qCollegeMates(p){if(!p.college)return null;const m=POOL.filter(x=>x.college===p.college&&x.name!==p.name).map(x=>x.name);if(!m.length)return null;const c=pick(m),w=POOL.filter(x=>x.college!==p.college).map(x=>x.name);if(w.length<3)return null;return{q:`Which player also attended ${p.college} like ${p.name}?`,choices:shuffle([c,...sample(w,3)]),answer:c,cat:"College Mates",player:p.name};}

const MAKERS=[qTeam,qPosition,qCollege,qJersey,qRosterSpot,qDivision,qConference,qAge,qExperience,qCollegeMates];

function buildQuiz(n){const qs=[];let t=0;while(qs.length<n&&t++<n*25){const p=pick(POOL),fn=pick(MAKERS),q=fn(p);if(q)qs.push(q);}return qs;}

// ── RENDER ────────────────────────────────────────────────────────────────────
function setState(patch){Object.assign(state,patch);render();}

function render(){
  if(state.screen==="loading") app.innerHTML=renderLoading();
  if(state.screen==="menu")    app.innerHTML=renderMenu();
  if(state.screen==="quiz")    app.innerHTML=renderQuiz();
  if(state.screen==="results") app.innerHTML=renderResults();
  bindEvents();
}

function renderLoading(){return`<div class="header"><div class="logo">NFL QUIZ</div><div class="logo-sub">Ball Knowledge</div></div><div class="card screen"><div class="loading"><div class="spinner"></div><div class="loading-title">Loading Rosters</div><div class="loading-sub">Fetching current NFL player data...</div></div></div>`;}

function renderMenu(){
  return`<div class="header screen"><div class="logo">NFL QUIZ</div><div class="logo-sub">Ball Knowledge</div></div>
  <div class="card screen">
    <div class="section-label">Choose a mode</div>
    <button class="menu-btn" data-action="start" data-n="5"><span class="btn-icon">⚡</span><span class="btn-label">Quick Blitz</span><span class="btn-meta">5 questions</span></button>
    <button class="menu-btn" data-action="start" data-n="15"><span class="btn-icon">🏈</span><span class="btn-label">Standard Game</span><span class="btn-meta">15 questions</span></button>
    <button class="menu-btn" data-action="start" data-n="25"><span class="btn-icon">🏆</span><span class="btn-label">Full Gauntlet</span><span class="btn-meta">25 questions</span></button>
    <hr class="divider">
    <div class="footnote">${POOL.length} players · 32 teams · 10 question types</div>
    ${UPDATED?`<div class="updated-tag">Roster data updated ${UPDATED}</div>`:""}
  </div>`;
}

function renderQuiz(){
  const{questions:qs,idx,selected,streak}=state;
  const q=qs[idx],pct=idx/qs.length*100,meta=CAT_META[q.cat]||{color:"#94a3b8",icon:"❓"};
  const answered=selected!==null,letters=["A","B","C","D"];
  const choices=q.choices.slice(0,4).map((ch,i)=>{
    let cls="choice";
    if(answered){if(ch===q.answer)cls+=" correct";else if(ch===selected)cls+=" wrong";}
    return`<button class="${cls}" data-action="choose" data-choice="${encodeURIComponent(ch)}"${answered?" disabled":""}><span class="letter">${letters[i]}</span>${ch}</button>`;
  }).join("");
  const qText=q.q.replace(new RegExp(q.player.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')),`<span class="player-name">${q.player}</span>`);
  return`<div style="width:100%;max-width:580px">
    <div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card screen">
      <div class="q-meta"><span class="q-counter">Q ${idx+1} / ${qs.length}</span>${streak>=2?`<span class="streak">🔥 ${streak} streak</span>`:""}</div>
      <div class="cat-badge" style="color:${meta.color};border-color:${meta.color}44;background:${meta.color}11">${meta.icon} ${q.cat}</div>
      <div class="question">${qText}</div>
      <div class="choices">${choices}</div>
      ${answered?`<div class="feedback ${selected===q.answer?"correct":"wrong"}">${selected===q.answer?"✅ Correct!":"❌ Wrong — correct answer: <strong>"+q.answer+"</strong>"}</div>`:""}
      ${answered?`<button class="next-btn" data-action="next">${idx+1>=qs.length?"See Results →":"Next Question →"}</button>`:""}
    </div></div>`;
}

function renderResults(){
  const{results}=state,total=results.length,score=results.filter(r=>r.correct).length,pct=Math.round(score/total*100);
  const grades=[[100,"🏆","PERFECT! NFL Genius!","#4ade80"],[80,"🌟","Excellent!","#86efac"],[60,"👍","Solid NFL knowledge!","#fbbf24"],[40,"📚","Study the depth charts!","#fb923c"],[0,"😬","Hit the film room!","#f87171"]];
  const[,em,txt,gc]=grades.find(([t])=>pct>=t);
  const catMap={};
  results.forEach(r=>{if(!catMap[r.cat])catMap[r.cat]=[0,0];catMap[r.cat][1]++;if(r.correct)catMap[r.cat][0]++;});
  const catRows=Object.entries(catMap).map(([cat,[c,a]])=>{const m=CAT_META[cat]||{color:"#94a3b8",icon:"❓"};return`<div class="cat-row"><div class="cat-name">${m.icon} ${cat}</div><div class="bar-wrap"><div class="bar-fill" style="width:${a?c/a*100:0}%;background:${m.color}"></div></div><div class="cat-frac">${c}/${a}</div></div>`;}).join("");
  return`<div class="card screen" style="max-width:580px;text-align:center">
    <div class="score-huge">${score}<span style="font-size:52px;opacity:.3">/${total}</span></div>
    <div class="score-sub">${pct}% correct</div>
    <div class="grade-row"><span class="grade-emoji">${em}</span><span class="grade-text" style="color:${gc}">${txt}</span></div>
    <hr class="divider" style="margin:20px 0">
    <div class="section-label" style="text-align:left">By Category</div>
    <div class="cat-list">${catRows}</div>
    <button class="play-again" data-action="menu">Play Again 🏈</button>
  </div>`;
}

function bindEvents(){
  document.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click",e=>{
      const a=e.currentTarget.dataset.action;
      if(a==="start"){const n=parseInt(e.currentTarget.dataset.n);setState({screen:"quiz",questions:buildQuiz(n),idx:0,selected:null,streak:0,results:[]});}
      if(a==="choose"){if(state.selected!==null)return;const ch=decodeURIComponent(e.currentTarget.dataset.choice),ok=ch===state.questions[state.idx].answer;setState({selected:ch,streak:ok?state.streak+1:0,results:[...state.results,{cat:state.questions[state.idx].cat,correct:ok}]});}
      if(a==="next"){const nx=state.idx+1;if(nx>=state.questions.length)setState({screen:"results"});else setState({idx:nx,selected:null});}
      if(a==="menu")setState({screen:"menu",questions:[],idx:0,selected:null,streak:0,results:[]});
    });
  });
}

// ── BOOT ─────────────────────────────────────────────────────────────────────
render(); // show spinner

fetch("roster.json")
  .then(r=>r.json())
  .then(data=>{
    UPDATED = data.updated || "";
    POOL = data.players.map(p=>({
      name:p.n, pos:p.p, jersey:p.j, abbrev:p.t,
      college:p.c, age:p.a, exp:p.e,
      team: NFL_TEAMS[p.t] || p.t,
    }));
    setState({screen:"menu"});
  })
  .catch(err=>{
    console.error("Could not load roster.json:", err);
    // Should never happen on GitHub Pages since the file is in the same repo
    app.innerHTML=`<div class="card screen" style="max-width:500px;text-align:center;padding:48px">
      <div style="font-size:48px;margin-bottom:16px">😬</div>
      <div style="font-size:18px;font-weight:600;margin-bottom:8px">roster.json not found</div>
      <div style="font-size:14px;color:var(--dim)">Make sure roster.json is in the same folder as index.html in your GitHub repo.</div>
    </div>`;
  });
</script>
</body>
</html>
