<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NFL Player Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--card:#0f1729;--border:rgba(255,255,255,0.07);
  --text:#e2e8f0;--dim:#64748b;--mid:#94a3b8;
  --blue:#38bdf8;--purple:#c084fc;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;
}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh}
.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 64px;
  background:radial-gradient(ellipse at 15% 0%,rgba(56,189,248,.07) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 100%,rgba(192,132,252,.07) 0%,transparent 55%)}
/* LOGO */
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,9vw,76px);letter-spacing:4px;line-height:1;
  background:linear-gradient(135deg,var(--blue) 0%,var(--purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{color:var(--dim);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.header{text-align:center;margin-bottom:36px}
/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;
  width:100%;max-width:580px;box-shadow:0 0 0 1px rgba(56,189,248,.04),0 32px 80px rgba(0,0,0,.55)}
/* MENU */
.menu-btn{display:flex;align-items:center;gap:14px;width:100%;padding:18px 22px;border-radius:14px;
  border:1px solid var(--border);background:rgba(255,255,255,.025);color:var(--text);cursor:pointer;
  font-family:inherit;font-size:15px;font-weight:600;text-align:left;transition:all .2s;margin-bottom:10px}
.menu-btn:hover{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.4);color:var(--blue);transform:translateX(5px)}
.btn-icon{font-size:22px;flex-shrink:0}
.btn-label{flex:1}
.btn-meta{font-size:12px;color:var(--dim);font-weight:500}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.footnote{font-size:11px;color:#273040;text-align:center;letter-spacing:.5px}
/* PROGRESS */
.progress-wrap{width:100%;height:4px;background:rgba(255,255,255,.05);border-radius:2px;margin-bottom:30px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:2px;transition:width .4s ease}
/* QUIZ */
.q-meta{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.q-counter{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim)}
.streak{display:inline-flex;align-items:center;gap:5px;background:rgba(251,191,36,.1);
  border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:3px 11px;
  font-size:12px;color:var(--yellow);font-weight:700}
.cat-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:20px;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  border:1px solid currentColor;margin-bottom:18px}
.question{font-size:clamp(17px,3.2vw,22px);font-weight:500;line-height:1.55;margin-bottom:28px;color:#f1f5f9}
.player{color:var(--blue);font-weight:700}
/* CHOICES */
.choices{display:flex;flex-direction:column;gap:10px}
.choice{display:flex;align-items:center;gap:13px;padding:15px 20px;border-radius:13px;
  border:1px solid var(--border);background:rgba(255,255,255,.025);color:#cbd5e1;
  cursor:pointer;font-family:inherit;font-size:15px;font-weight:500;text-align:left;
  transition:all .18s;width:100%}
.choice:hover:not(:disabled){background:rgba(56,189,248,.08);border-color:rgba(56,189,248,.35);color:var(--text)}
.choice.correct{background:rgba(74,222,128,.13);border-color:var(--green);color:var(--green)}
.choice.wrong{background:rgba(248,113,113,.13);border-color:var(--red);color:var(--red)}
.choice:disabled{cursor:default}
.letter{width:28px;height:28px;border-radius:50%;border:1.5px solid currentColor;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
/* FEEDBACK */
.feedback{margin-top:18px;padding:13px 17px;border-radius:12px;font-size:15px;font-weight:500}
.feedback.correct{background:rgba(74,222,128,.08);color:var(--green);border:1px solid rgba(74,222,128,.2)}
.feedback.wrong{background:rgba(248,113,113,.08);color:var(--red);border:1px solid rgba(248,113,113,.2)}
/* NEXT BTN */
.next-btn{margin-top:16px;width:100%;padding:16px;border-radius:13px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--purple));color:#0a0e1a;
  font-family:inherit;font-size:16px;font-weight:700;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.next-btn:hover{opacity:.88;transform:translateY(-2px)}
/* RESULTS */
.score-huge{font-family:'Bebas Neue',sans-serif;font-size:90px;line-height:1;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-sub{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--dim)}
.grade-row{display:flex;align-items:center;gap:10px;margin:14px 0 4px;justify-content:center}
.grade-emoji{font-size:34px}
.grade-text{font-size:19px;font-weight:700}
.section-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#334155;margin-bottom:14px}
.cat-list{display:flex;flex-direction:column;gap:9px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-name{font-size:13px;width:130px;color:var(--mid);white-space:nowrap}
.bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .7s ease}
.cat-frac{font-size:12px;color:var(--dim);width:32px;text-align:right}
.play-again{width:100%;padding:18px;border-radius:14px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--purple));color:#0a0e1a;
  font-family:inherit;font-size:17px;font-weight:700;margin-top:24px;
  transition:opacity .2s,transform .1s;letter-spacing:.3px}
.play-again:hover{opacity:.88;transform:translateY(-2px)}
/* SCREEN TRANSITIONS */
.screen{animation:fadeUp .3s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

// Build player pool
const PLAYERS = RAW.map(([n,p,j,t,c,a,e]) => ({
  name:n, pos:p, jersey:j, abbrev:t, college:c, age:a, exp:e,
  team: NFL_TEAMS[t] || t

// ── HELPERS ───────────────────────────────────────────────────────────────
const shuffle = a => [...a].sort(()=>Math.random()-.5);
const sample  = (a,n) => shuffle(a).slice(0,n);
const pick    = a => a[Math.floor(Math.random()*a.length)];

function randNums(exclude, min, max, n) {
  const s = new Set();
  let tries = 0;
  while (s.size < n && tries++ < 200) {
    const v = Math.floor(Math.random()*(max-min+1))+min;
    if (v !== exclude) s.add(v);
  }
  return [...s];
}

// ── QUESTION GENERATORS ───────────────────────────────────────────────────
function qTeam(p) {
  const wrong = sample(Object.values(NFL_TEAMS).filter(t=>t!==p.team),3);
  return {q:`What team does ${p.name} play for?`,
    choices:shuffle([p.team,...wrong]),answer:p.team,cat:"Team",player:p.name};
}
function qPosition(p) {
  if (!POSITIONS[p.pos]) return null;
  const correct = POSITIONS[p.pos];
  const wrong = sample(Object.values(POSITIONS).filter(v=>v!==correct),3);
  return {q:`What position does ${p.name} play?`,
    choices:shuffle([correct,...wrong]).slice(0,4),answer:correct,cat:"Position",player:p.name};
}
function qCollege(p) {
  if (!p.college) return null;
  const others = [...new Set(PLAYERS.map(x=>x.college).filter(c=>c&&c!==p.college))];
  if (others.length<3) return null;
  return {q:`Which college did ${p.name} attend?`,
    choices:shuffle([p.college,...sample(others,3)]),answer:p.college,cat:"College",player:p.name};
}
function qJersey(p) {
  const num = parseInt(p.jersey);
  if (isNaN(num)) return null;
  const wrong = randNums(num,Math.max(1,num-10),Math.min(99,num+10),3).map(String);
  return {q:`What jersey number does ${p.name} wear?`,
    choices:shuffle([p.jersey,...wrong]),answer:p.jersey,cat:"Jersey #",player:p.name};
}
function qRosterSpot(p) {
  if (!POSITIONS[p.pos]) return null;
  const same = PLAYERS.filter(x=>x.pos===p.pos&&x.team!==p.team&&x.name!==p.name).map(x=>x.name);
  if (same.length<3) return null;
  const choices = shuffle([p.name,...sample(same,3)]);
  return {q:`Which player is the ${POSITIONS[p.pos]} for the ${p.team}?`,
    choices,answer:p.name,cat:"Roster Spot",player:p.name};
}
function qDivision(p) {
  const div = Object.entries(DIVISIONS).find(([,ts])=>ts.includes(p.team))?.[0];
  if (!div) return null;
  const wrong = sample(Object.keys(DIVISIONS).filter(d=>d!==div),3);
  return {q:`Which division does the ${p.team} play in?`,
    choices:shuffle([div,...wrong]),answer:div,cat:"Division",player:p.name};
}
function qConference(p) {
  const div = Object.entries(DIVISIONS).find(([,ts])=>ts.includes(p.team))?.[0];
  if (!div) return null;
  const conf = div.startsWith("AFC")?"AFC":"NFC";
  const other = conf==="AFC"?"NFC":"AFC";
  return {q:`Is the ${p.team} in the AFC or NFC?`,
    choices:shuffle([conf,other,conf+" East",other+" West"]),answer:conf,cat:"Conference",player:p.name};
}
function qAge(p) {
  if (!p.age) return null;
  const wrong = randNums(p.age,Math.max(20,p.age-5),p.age+5,3).map(String);
  return {q:`How old is ${p.name}?`,
    choices:shuffle([String(p.age),...wrong]),answer:String(p.age),cat:"Age",player:p.name};
}
function qExperience(p) {
  const lbl = n=>`${n} year${n!==1?"s":""}`;
  const correct = lbl(p.exp);
  const wrong = randNums(p.exp,Math.max(0,p.exp-5),p.exp+5,3).map(lbl);
  return {q:`How many years of NFL experience does ${p.name} have?`,
    choices:shuffle([correct,...wrong]),answer:correct,cat:"Experience",player:p.name};
}
function qCollegeMates(p) {
  if (!p.college) return null;
  const mates = PLAYERS.filter(x=>x.college===p.college&&x.name!==p.name).map(x=>x.name);
  if (!mates.length) return null;
  const correct = pick(mates);
  const wrong = PLAYERS.filter(x=>x.college!==p.college).map(x=>x.name);
  if (wrong.length<3) return null;
  return {q:`Which player also attended ${p.college} like ${p.name}?`,
    choices:shuffle([correct,...sample(wrong,3)]),answer:correct,cat:"College Mates",player:p.name};
}

const MAKERS = [qTeam,qPosition,qCollege,qJersey,qRosterSpot,qDivision,qConference,qAge,qExperience,qCollegeMates];

function buildQuiz(n) {
  const qs=[]; let tries=0;
  while(qs.length<n && tries++<n*25) {
    const p=pick(PLAYERS), fn=pick(MAKERS), q=fn(p);
    if(q) qs.push(q);
  }
  return qs;
}

      <span class="btn-meta">5 questions</span>
    </button>
    <button class="menu-btn" data-action="start" data-n="15">
      <span class="btn-icon">🏈</span>
      <span class="btn-label">Standard Game</span>
      <span class="btn-meta">15 questions</span>
    </button>
    <button class="menu-btn" data-action="start" data-n="25">
      <span class="btn-icon">🏆</span>
      <span class="btn-label">Full Gauntlet</span>
      <span class="btn-meta">25 questions</span>
    </button>
    <hr class="divider">
    <div class="footnote">${PLAYERS.length} players · 32 teams · 10 question types</div>
  </div>`;
}

function renderQuiz() {
  const {questions,idx,selected,streak} = state;
  const q = questions[idx];
  const pct = idx/questions.length*100;
  const meta = CAT_META[q.cat]||{color:"#94a3b8",icon:"❓"};
  const answered = selected !== null;
  const letters = ["A","B","C","D"];

  const choicesHtml = q.choices.slice(0,4).map((ch,i)=>{
    let cls = "choice";
    if (answered) {
      if (ch===q.answer) cls+=" correct";
      else if (ch===selected) cls+=" wrong";
    }
    return `<button class="${cls}" data-action="choose" data-choice="${encodeURIComponent(ch)}"
      ${answered?"disabled":""}>
      <span class="letter">${letters[i]}</span>${ch}
    </button>`;
  }).join("");

  const feedbackHtml = answered ? `
    <div class="feedback ${selected===q.answer?"correct":"wrong"}">
      ${selected===q.answer?"✅ Correct!":"❌ Wrong! The answer was: <strong>"+q.answer+"</strong>"}
    </div>` : "";

  const nextLabel = idx+1>=questions.length?"See Results →":"Next Question →";

  // Highlight player name in question
  const qText = q.q.replace(q.player, `<span class="player">${q.player}</span>`);

  return `
  <div style="width:100%;max-width:580px">
    <div class="progress-wrap">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="card screen">
      <div class="q-meta">
        <span class="q-counter">Q ${idx+1} / ${questions.length}</span>
        ${streak>=2?`<span class="streak">🔥 ${streak} streak</span>`:""}
      </div>
      <div class="cat-badge" style="color:${meta.color};border-color:${meta.color}44;background:${meta.color}11">
        ${meta.icon} ${q.cat}
      </div>
      <div class="question">${qText}</div>
      <div class="choices">${choicesHtml}</div>
      ${feedbackHtml}
      ${answered?`<button class="next-btn" data-action="next">${nextLabel}</button>`:""}
    </div>
  </div>`;
}

function renderResults() {
  const {results} = state;
  const total = results.length;
  const score = results.filter(r=>r.correct).length;
  const pct = Math.round(score/total*100);

  const grades = [
    [100,"🏆","PERFECT! NFL Genius!","#4ade80"],
    [80, "🌟","Excellent!","#86efac"],
    [60, "👍","Solid NFL knowledge!","#fbbf24"],
    [40, "📚","Study the depth charts!","#fb923c"],
    [0,  "😬","Hit the film room!","#f87171"],
  ];
  const [,em,txt,gc] = grades.find(([t])=>pct>=t);

  const catMap = {};
  results.forEach(r=>{
    if(!catMap[r.cat]) catMap[r.cat]=[0,0];
    catMap[r.cat][1]++;
    if(r.correct) catMap[r.cat][0]++;
  });

  const catRows = Object.entries(catMap).map(([cat,[c,a]])=>{
    const m = CAT_META[cat]||{color:"#94a3b8",icon:"❓"};
    const w = a?Math.round(c/a*100):0;
    return `<div class="cat-row">
      <div class="cat-name">${m.icon} ${cat}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${w}%;background:${m.color}"></div></div>
      <div class="cat-frac">${c}/${a}</div>
    </div>`;
  }).join("");

  return `
  <div class="card screen" style="max-width:580px;text-align:center">
    <div class="score-huge">${score}<span style="font-size:50px;opacity:.35">/${total}</span></div>
    <div class="score-sub">${pct}% correct</div>
    <div class="grade-row">
      <span class="grade-emoji">${em}</span>
      <span class="grade-text" style="color:${gc}">${txt}</span>
    </div>
    <hr class="divider" style="margin:20px 0">
    <div class="section-label" style="text-align:left">By Category</div>
    <div class="cat-list">${catRows}</div>
    <button class="play-again" data-action="menu">Play Again 🏈</button>
  </div>`;
}

function bindEvents() {
  document.querySelectorAll("[data-action]").forEach(el=>{
    el.addEventListener("click", handleAction);
  });
}

function handleAction(e) {
  const el = e.currentTarget;
  const action = el.dataset.action;

  if (action==="start") {
    const n = parseInt(el.dataset.n);
    setState({screen:"quiz",questions:buildQuiz(n),idx:0,selected:null,streak:0,results:[]});
  }
  if (action==="choose") {
    if (state.selected!==null) return;
    const choice = decodeURIComponent(el.dataset.choice);
    const correct = choice===state.questions[state.idx].answer;
    const newStreak = correct ? state.streak+1 : 0;
    const newResults = [...state.results, {cat:state.questions[state.idx].cat, correct}];
    setState({selected:choice, streak:newStreak, results:newResults});
  }
  if (action==="next") {
    const next = state.idx+1;
    if (next>=state.questions.length) setState({screen:"results"});
    else setState({idx:next, selected:null});
  }
  if (action==="menu") {
    setState({screen:"menu",questions:[],idx:0,selected:null,streak:0,results:[]});
  }
}

render();
</script>
</body>
</html>
